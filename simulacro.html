<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulacro Demo | SimulaUNMSM</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="simulacro.css">
</head>
<body>
  <header class="quiz-header">
    <a class="back-link" href="index.html">Volver al inicio</a>
    <h1>Simulacro de Álgebra y Geometría</h1>
    <p>10 preguntas tipo admisión, cronómetro activo y corrección inmediata.</p>
  </header>

  <main class="quiz-main">
    <section id="start-screen" class="quiz-panel">
      <h2>Modo Demo</h2>
      <p>Tiempo máximo: <strong>10 minutos</strong>. Responde cada pregunta y revisa tu desempeño al final.</p>
      <button id="start-btn" class="btn btn-action" type="button">Empezar simulacro</button>
    </section>

    <section id="quiz-screen" class="quiz-panel hidden" aria-live="polite">
      <div class="status-row">
        <p id="progress-text">Pregunta 1 de 10</p>
        <p id="timer" class="timer">10:00</p>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div id="progress-bar" class="progress-bar"></div>
      </div>

      <h2 id="question-title">Pregunta</h2>
      <div id="options" class="options"></div>

      <div class="actions">
        <button id="check-btn" class="btn btn-action" type="button">Validar respuesta</button>
        <button id="next-btn" class="btn btn-secondary hidden" type="button">Siguiente</button>
      </div>

      <p id="feedback" class="feedback" role="status"></p>
    </section>

    <section id="result-screen" class="quiz-panel hidden">
      <h2>Resultado final</h2>
      <p id="score-text" class="score-text"></p>
      <p id="level-text"></p>
      <p id="best-score-text"></p>
      <div class="actions">
        <button id="retry-btn" class="btn btn-action" type="button">Intentar de nuevo</button>
        <a class="btn btn-secondary" href="index.html">Ir al inicio</a>
      </div>
      <div id="review-list" class="review-list"></div>
    </section>
  </main>

  <script src="simulacro.js"></script>
</body>
</html>
